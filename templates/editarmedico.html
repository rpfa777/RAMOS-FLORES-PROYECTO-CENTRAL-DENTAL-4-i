<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <title>Editar Médico</title>
</head>
<body>
<header>
    <h1>Editar Médico</h1>
</header>
<main>
    <div class="form-container">
        <form action="/medicos/actualizar/{{ medico.id_medico }}" method="POST">
            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" name="nombre" value="{{ medico.nombre }}" required>
            </div>
            <div class="form-group">
                <label>Especialidad:</label>
                <input type="text" name="especialidad" value="{{ medico.especialidad }}" required>
            </div>
            <div class="form-group">
                <label>Cédula:</label>
                <input type="text" name="cedula" value="{{ medico.cedula }}" required>
            </div>
            <div class="form-group">
                <label>Sala:</label>
                <input type="text" name="sala" value="{{ medico.sala }}" required>
            </div>
            <div class="form-group">
                <label>Teléfono:</label>
                <input type="text" name="telefono" value="{{ medico.telefono }}" required>
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="text" name="email" value="{{ medico.email }}" required>
            </div>
            <button type="submit" class="btn-submit">Guardar Cambios</button>
            <a href="/medicos" class="btn-cancelar">Cancelar</a>
        </form>
    </div>
</main>
<style>
    body { font-family: "Poppins", sans-serif; background-color: #48D1CC; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
    h1 { color: Teal; }
    .form-container { max-width: 500px; width: 100%; background: LightCyan; padding: 35px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); border-top: 6px solid CadetBlue; margin-top: 30px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
    input[type="text"] { width: 100%; padding: 10px; border: 1px solid black; border-radius: 6px; font-size: 14px; background-color: Azure; }
    .btn-submit { background-color: DarkSlateGray; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn-submit:hover { background-color: DarkSeaGreen; }
    .btn-cancelar { display: block; text-align: center; margin-top: 12px; color: gray; text-decoration: none; font-size: 14px; }
</style>
</body>
</html>
