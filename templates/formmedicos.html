<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Jua:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Alta de Médicos</title>
</head>
<body>

<header>
    <h1>Alta de Médicos - Consultorio Central Dental</h1>
    <img src="{{ url_for('static', filename='dentistaa.png') }}" alt="Dentista">
    <p>Bienvenido a Central Dental, por favor rellene el formulario solicitado.</p>
</header>

<main>
    <div class="form-container">
       <form action="/medicos/guardar" method="POST">
            <div class="form-group">
                <label>ID del Médico:</label>
                <input type="text" name="id_medico" placeholder="Ej: DOC-002" required>
            </div>
            
            <div class="form-group">
                <label>Nombre Completo:</label>
                <input type="text" name="nombre" placeholder="Ej: Dra. Sofía Méndez" required>
            </div>
            
            <div class="form-group">
                <label>Especialidad:</label>
                <input type="text" name="especialidad" placeholder="Ej: Endodoncia" required>
            </div>

            <div class="form-group">
                <label>Cédula:</label>
                <input type="number" name="cedula" placeholder="Ej: 8832109" required>
            </div>

            <div class="form-group">
                <label>Sala:</label>
                <input type="number" name="sala" placeholder="Ej: 105" required>
            </div>

            <div class="form-group">
                <label>Teléfono:</label>
                <input type="text" name="telefono" placeholder="Ej: 555-0102" required>
            </div>

            <div class="form-group">
                <label>Correo Electrónico:</label>
                <input type="text" name="email" placeholder="Ej: s.mendez@clinica.com" required>
            </div>

            <button type="submit" class="btn-submit">Dar de alta al Médico</button>
        </form>
    </div>
</main>

<footer>
    <p>Ramos Flores Alexis </p>
    <p>Programación </p>
    <p>24308051280643 </p>
    <p>4-I </p>
</footer>

</body>
<style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: "Poppins", sans-serif;
        background-color: #66FFCD;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    header {
        background-color: #66FFCD;
        width: 100%;
        padding: 20px 0;
        text-align: center;
    }

    h1 {
        color: Teal;
        font-family: 'Jua', sans-serif;
        margin: 0;
        font-size: 2rem;
    }

    main {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        padding: 40px 20px;
        flex: 1;
    }

    .form-container {
        max-width: 500px;
        width: 100%;
        background: LightCyan;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        border-top: 6px solid CadetBlue;
    }

    .form-group {
        margin-bottom: 22px;
    }
    
    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: Black;
        font-size: 14px;
    }
    
    input[type="text"], input[type="number"] {
        width: 100%;
        padding: 12px;
        border: 1px solid Black;
        border-radius: 6px;
        font-family: "Times New Roman", sans-serif;
        font-size: 14px;
        background-color: Azure;
        color: #333;
        transition: all 0.3s ease;
    }

    input:focus {
        outline: none;
        border-color: SkyBlue;
        background-color: AliceBlue;
        box-shadow: 0 0 5px rgba(0, 128, 128, 0.4);
    }

    .btn-submit {
        background-color: DarkSlateGray;
        color: white;
        border: none;
        padding: 14px 15px;
        width: 100%;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s ease;
        font-family: "Poppins", sans-serif;
        margin-top: 10px;
    }

    .btn-submit:hover {
        background-color: DarkSeaGreen;
    }

    footer {
        width: 100%;
        background-color: Azure;
        padding: 15px 0;
        text-align: center;
        font-size: 13px;
        color: #776a78;
    }

    footer p {
        margin: 4px 0;
        font-family: 'Poppins', sans-serif;
    }
</style>
</html>
