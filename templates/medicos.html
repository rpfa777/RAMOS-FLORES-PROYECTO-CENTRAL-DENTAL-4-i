<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Médicos</title>
<style>
    body { background-color: #cbf9ff; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
    .btn-agregar { background-color: green; color: white; padding: 10px 20px; text-decoration: none; border-radius: 6px; font-weight: bold; }
    table { border-collapse: collapse; width: 100%; background-color: #ffffff; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    thead tr { background-color: #f2f2f2; }
    .btn-regresar { color: blue; font-weight: bold; font-size: 16px; text-decoration: none; }
</style>
</head>
<body>

<h3>Colección: Médicos</h3>
<div style="margin-bottom: 15px;">
    <a href="/medicos/nuevo" class="btn-agregar">+ Agregar Médico</a>
</div>

<table>
<thead>
    <tr>
        <th>id_medico</th>
        <th>nombre</th>
        <th>especialidad</th>
        <th>cedula</th>
        <th>sala</th>
        <th>telefono</th>
        <th>email</th>
        <th>Acciones</th>
    </tr>
</thead>
<tbody>
    {% for m in medicos %}
    <tr>
        <td>{{ m.id_medico }}</td>
        <td>{{ m.nombre }}</td>
        <td>{{ m.especialidad }}</td>
        <td>{{ m.cedula }}</td>
        <td>{{ m.sala }}</td>
        <td>{{ m.telefono }}</td>
        <td>{{ m.email }}</td>
        <td>
            <a href="/medicos/editar/{{ m.id_medico }}" style="background-color: orange; color: white; padding: 6px 12px; border-radius: 4px; text-decoration: none; font-size: 13px;">Editar</a>
            <form action="/medicos/borrar/{{ m.id_medico }}" method="POST" style="display:inline;">
                <button type="submit" style="background-color: red; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px;">Borrar</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</tbody>
</table>

<hr style="border: 1px dashed Teal; margin-top: 30px;">
<div style="text-align:center;">
    <a href="/" class="btn-regresar">← Volver al Menú Principal</a>
</div>

</body>
</html>
