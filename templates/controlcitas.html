<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Citas</title>
<style>
    body { background-color: #cbf9ff; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
    .btn-agregar { background-color: green; color: white; padding: 10px 20px; text-decoration: none; border-radius: 6px; font-weight: bold; }
    table { border-collapse: collapse; width: 100%; background-color: #ffffff; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    thead tr { background-color: #f2f2f2; }
    .btn-regresar { color: blue; font-weight: bold; font-size: 16px; text-decoration: none; }
</style>
</head>
<body>

<h3>Colección: Control de Citas</h3>
<div style="margin-bottom: 15px;">
    <a href="/controlcitas/nuevo" class="btn-agregar">+ Agregar Cita</a>
</div>

<table>
<thead>
    <tr>
        <th>id_cita</th>
        <th>paciente</th>
        <th>fecha</th>
        <th>hora</th>
        <th>motivo</th>
        <th>diagnostico</th>
        <th>tratamiento</th>
        <th>Acciones</th>
    </tr>
</thead>
<tbody>
    {% for c in citas %}
    <tr>
        <td>{{ c.id_cita }}</td>
        <td>{{ c.paciente }}</td>
        <td>{{ c.fecha }}</td>
        <td>{{ c.hora }}</td>
        <td>{{ c.motivo }}</td>
        <td>{{ c.diagnostico }}</td>
        <td>{{ c.tratamiento }}</td>
        <td>
            <a href="/controlcitas/editar/{{ c.id_cita }}" style="background-color: orange; color: white; padding: 6px 12px; border-radius: 4px; text-decoration: none; font-size: 13px;">Editar</a>
            <form action="/controlcitas/borrar/{{ c.id_cita }}" method="POST" style="display:inline;">
                <button type="submit" style="background-color: red; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px;">Borrar</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</tbody>
</table>

<hr style="border: 1px dashed Teal; margin-top: 30px;">
<div style="text-align:center;">
    <a href="/" class="btn-regresar">← Volver al Menú Principal</a>
</div>

</body>
</html>
