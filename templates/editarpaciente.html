<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <title>Editar Paciente</title>
</head>
<body>
<header>
    <h1>Editar Paciente</h1>
</header>
<main>
    <div class="form-container">
        <form action="/pacientes/actualizar/{{ paciente.id_paciente }}" method="POST">
            <div class="form-group">
                <label>Nombre Completo:</label>
                <input type="text" name="nombre_completo" value="{{ paciente.nombre_completo }}" required>
            </div>
            <div class="form-group">
                <label>Fecha de Nacimiento:</label>
                <input type="text" name="f_nacimiento" value="{{ paciente.f_nacimiento }}" required>
            </div>
            <div class="form-group">
                <label>Género:</label>
                <input type="text" name="genero" value="{{ paciente.genero }}" required>
            </div>
            <div class="form-group">
                <label>Teléfono:</label>
                <input type="text" name="telefono" value="{{ paciente.telefono }}" required>
            </div>
            <div class="form-group">
                <label>Correo:</label>
                <input type="text" name="correo" value="{{ paciente.correo }}" required>
            </div>
            <div class="form-group">
                <label>RFC:</label>
                <input type="text" name="rfc" value="{{ paciente.rfc }}" required>
            </div>
            <div class="form-group">
                <label>Aseguradora:</label>
                <input type="text" name="aseguradora" value="{{ paciente.aseguradora }}" required>
            </div>
            <button type="submit" class="btn-submit">Guardar Cambios</button>
            <a href="/pacientes" class="btn-cancelar">Cancelar</a>
        </form>
    </div>
</main>
<style>
    body { font-family: "Poppins", sans-serif; background-color: #48D1CC; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
    h1 { color: Teal; }
    .form-container { max-width: 500px; width: 100%; background: LightCyan; padding: 35px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); border-top: 6px solid CadetBlue; margin-top: 30px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
    input[type="text"] { width: 100%; padding: 10px; border: 1px solid black; border-radius: 6px; font-size: 14px; background-color: Azure; }
    .btn-submit { background-color: DarkSlateGray; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn-submit:hover { background-color: DarkSeaGreen; }
    .btn-cancelar { display: block; text-align: center; margin-top: 12px; color: gray; text-decoration: none; font-size: 14px; }
</style>
</body>
</html>
